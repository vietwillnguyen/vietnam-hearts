name: Deploy to Cloud Run

# Post-merge pipeline: every push to main runs the test suite and, when green,
# builds the Docker image and deploys it to Cloud Run.
# Auth is keyless via Workload Identity Federation (no stored SA keys):
#   pool "github" / provider "github-oidc", restricted to this repository,
#   impersonating github-actions@refined-vector-457419-n6.iam.gserviceaccount.com

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    # setup-uv caches uv's wheel store keyed on uv.lock, and `uv sync --frozen`
    # always reconciles the venv against the lockfile, so a stale cache
    # self-heals (this exact skip served a venv without sentry-sdk and failed
    # the deploy test job for PR #8 back in the Poetry days).
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run tests
      run: uv run pytest tests/ -v --tb=short
      env:
        DATABASE_URL: "sqlite:///file::memory:?cache=shared&uri=true"
        TESTING: "true"
        DRY_RUN: "true"
        ENVIRONMENT: "test"
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: "https://fake-url.supabase.co"
        SUPABASE_PUBLISHABLE_KEY: "fake-publishable-key"
        SUPABASE_SECRET_KEY: "fake-secret-key"
        GEMINI_API_KEY: "fake-gemini-key"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Serialize deploys: back-to-back merges once raced here and the older
    # image deployed last, rolling production back (issue #21). With
    # cancel-in-progress false the running deploy finishes and only the
    # newest queued run proceeds.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
    - uses: actions/checkout@v7
      with:
        # Full history so the ordering guard can run ancestry checks
        # against the currently deployed commit.
        fetch-depth: 0

    - name: Load deploy config
      id: config
      run: |
        source scripts/deploy.config
        {
          echo "project_id=${GCP_PROJECT_ID}"
          echo "image=${GCR_HOSTNAME}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          echo "version=${IMAGE_VERSION}"
          echo "service=${CLOUD_RUN_SERVICE}"
          echo "region=${CLOUD_RUN_REGION}"
          echo "base_url=${BASE_URL}"
        } >> "$GITHUB_OUTPUT"

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/367619842919/locations/global/workloadIdentityPools/github/providers/github-oidc
        service_account: github-actions@refined-vector-457419-n6.iam.gserviceaccount.com

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker gcr.io --quiet

    # The concurrency group serializes deploys but queues on test completion,
    # not commit order: an older merge whose tests finish late can still
    # deploy after a newer one and roll production back (issue #21). Skip
    # the deploy unless the currently serving commit is an ancestor of ours.
    - name: Check deploy ordering
      id: guard
      run: |
        image=$(gcloud run services describe "${{ steps.config.outputs.service }}" \
          --region "${{ steps.config.outputs.region }}" \
          --project "${{ steps.config.outputs.project_id }}" \
          --platform managed \
          --format 'value(spec.template.spec.containers[0].image)' 2>/dev/null) || image=""
        tag="${image##*:}"
        deployed_sha="${tag#sha-}"
        if [ -z "$image" ] || [ "$deployed_sha" = "$tag" ]; then
          echo "No sha-tagged image currently serving; proceeding with deploy."
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if ! git cat-file -e "${deployed_sha}^{commit}" 2>/dev/null; then
          echo "Deployed commit ${deployed_sha} not found in history; proceeding with deploy."
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if git merge-base --is-ancestor "$deployed_sha" "$GITHUB_SHA"; then
          echo "Deployed commit ${deployed_sha} is an ancestor of ${GITHUB_SHA}; proceeding with deploy."
          echo "proceed=true" >> "$GITHUB_OUTPUT"
        else
          echo "Deployed commit ${deployed_sha} is NOT an ancestor of ${GITHUB_SHA}; a newer commit is already live. Skipping stale deploy."
          echo "proceed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build image
      if: steps.guard.outputs.proceed == 'true'
      run: |
        docker build \
          -t "${{ steps.config.outputs.image }}:${{ steps.config.outputs.version }}" \
          -t "${{ steps.config.outputs.image }}:sha-${GITHUB_SHA::7}" \
          .

    - name: Push image
      if: steps.guard.outputs.proceed == 'true'
      run: |
        docker push "${{ steps.config.outputs.image }}:${{ steps.config.outputs.version }}"
        docker push "${{ steps.config.outputs.image }}:sha-${GITHUB_SHA::7}"

    - name: Deploy to Cloud Run
      if: steps.guard.outputs.proceed == 'true'
      run: |
        # Deploy the immutable per-commit tag (not the shared version tag)
        # so this run ships exactly the image it built, whatever else was
        # pushed to the registry in the meantime.
        gcloud run deploy "${{ steps.config.outputs.service }}" \
          --image "${{ steps.config.outputs.image }}:sha-${GITHUB_SHA::7}" \
          --region "${{ steps.config.outputs.region }}" \
          --platform managed \
          --project "${{ steps.config.outputs.project_id }}" \
          --quiet

    - name: Smoke check
      if: steps.guard.outputs.proceed == 'true'
      run: |
        for _ in $(seq 1 12); do
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.config.outputs.base_url }}/health") && \
            [ "$code" = "200" ] && echo "Service healthy" && exit 0
          sleep 5
        done
        echo "Health check failed after deploy" && exit 1
