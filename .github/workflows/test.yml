name: Run Tests

# PRs are tested here; pushes to main are tested + deployed by deploy.yml
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.12]
    
    steps:
    - uses: actions/checkout@v7
    
    # setup-uv caches uv's wheel store keyed on uv.lock, and `uv sync --frozen`
    # always reconciles the venv against the lockfile, so a stale cache
    # self-heals (a cached venv missing newly added dependencies broke the
    # deploy pipeline back in the Poetry days).
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run ruff lint
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Check for missing Alembic migrations
      run: |
        uv run alembic upgrade head
        uv run alembic check
      env:
        DATABASE_URL: "sqlite:////tmp/alembic_check.db"
        TESTING: "true"
        ENVIRONMENT: "test"
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: "https://fake-url.supabase.co"
        SUPABASE_PUBLISHABLE_KEY: "fake-publishable-key"
        SUPABASE_SECRET_KEY: "fake-secret-key"
        GEMINI_API_KEY: "fake-gemini-key"

    - name: Run tests
      run: |
        uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=45
      env:
        DATABASE_URL: "sqlite:///file::memory:?cache=shared&uri=true"
        TESTING: "true"
        DRY_RUN: "true"
        ENVIRONMENT: "test"
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: "https://fake-url.supabase.co"
        SUPABASE_PUBLISHABLE_KEY: "fake-publishable-key"
        SUPABASE_SECRET_KEY: "fake-secret-key"
        GEMINI_API_KEY: "fake-gemini-key"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results/
          .pytest_cache/
        retention-days: 7 