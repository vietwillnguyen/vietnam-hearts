name: Run Tests

# PRs are tested here; pushes to main are tested + deployed by deploy.yml
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      id: setup-python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
    
    # Always run install, even on a cache hit: it is near-instant when the
    # venv is current, and it self-heals a stale cache (a cached venv missing
    # newly added dependencies broke the deploy pipeline before poetry.lock
    # was committed and the cache key hash was meaningful).
    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Run ruff lint
      run: poetry run ruff check .

    - name: Run ruff format check
      run: poetry run ruff format --check .

    - name: Run tests
      run: |
        poetry run pytest tests/ -v --tb=short
      env:
        DATABASE_URL: "sqlite:///file::memory:?cache=shared&uri=true"
        TESTING: "true"
        DRY_RUN: "true"
        ENVIRONMENT: "test"
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: "https://fake-url.supabase.co"
        SUPABASE_PUBLISHABLE_KEY: "fake-publishable-key"
        SUPABASE_SECRET_KEY: "fake-secret-key"
        GEMINI_API_KEY: "fake-gemini-key"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results/
          .pytest_cache/
        retention-days: 7 